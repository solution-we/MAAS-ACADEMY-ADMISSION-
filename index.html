<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admission Form</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:white;
margin:0;
padding:20px;
}

.container{
max-width:650px;
margin:auto;
width:100%;
}

.logo{
display:block;
margin:auto;
max-width:200px;
margin-bottom:10px;
}

/* headings */

.year{
text-align:center;
font-size:24px;
font-weight:700;
letter-spacing:1px;
white-space:nowrap;
}

.sub{
text-align:center;
font-size:18px;
font-weight:600;
margin-bottom:30px;
color:#555;
}

label.title{
font-weight:600;
display:block;
margin-top:20px;
margin-bottom:6px;
}

/* inputs */

input[type=text],
input[type=tel],
textarea{
width:100%;
padding:12px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
display:block;
}

textarea{
height:90px;
resize:none;
}

/* option layout */

.options{
margin-top:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.option{
display:flex;
align-items:center;
gap:10px;
font-size:15px;
}

.option input{
flex:none;
width:18px;
height:18px;
}

/* button */

button{
margin-top:30px;
width:100%;
padding:14px;
border:none;
border-radius:6px;
background:black;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#222;
}

.hidden{
display:none;
}

.success{
text-align:center;
margin-top:18px;
color:green;
}

</style>

</head>

<body>

<div class="container">

<img class="logo"
src="https://zvbgebmthcawwybmyzkt.supabase.co/storage/v1/object/public/converted-images/converted_1772948540637_n97ywh.png">

<div class="year">ACADEMIC YEAR 2026-27</div>
<div class="sub">Admission Form</div>

<form id="form">

<label class="title">Name of the Student</label>
<input type="text" id="student" required>

<label class="title">Father</label>
<input type="text" id="father">

<label class="title">Mother</label>
<input type="text" id="mother">

<label class="title">Contact No.</label>
<input type="tel" id="contact" required>

<label class="title">Whatsapp No.</label>
<input type="tel" id="whatsapp" required>

<label class="title">Address</label>
<textarea id="address"></textarea>

<label class="title">Class</label>

<div class="options">

<label class="option">
<input type="radio" name="class" value="8"> 8
</label>

<label class="option">
<input type="radio" name="class" value="9"> 9
</label>

<label class="option">
<input type="radio" name="class" value="SSLC"> SSLC
</label>

</div>

<div id="subjectsSection" class="hidden">

<label class="title">Tough Subjects</label>

<div class="options">

<label class="option"><input type="checkbox" value="English"> English</label>
<label class="option"><input type="checkbox" value="Physics"> Physics</label>
<label class="option"><input type="checkbox" value="Chemistry"> Chemistry</label>
<label class="option"><input type="checkbox" value="Biology"> Biology</label>
<label class="option"><input type="checkbox" value="Maths"> Maths</label>
<label class="option"><input type="checkbox" value="Arabic"> Arabic</label>
<label class="option"><input type="checkbox" value="Malayalam"> Malayalam</label>
<label class="option"><input type="checkbox" value="Hindi"> Hindi</label>

<label class="option subject-social">
<input type="checkbox" value="Social Science"> Social Science
</label>

<label class="option subject-history">
<input type="checkbox" value="History"> History
</label>

<label class="option subject-geo">
<input type="checkbox" value="Geography"> Geography
</label>

</div>

</div>

<label class="title">School</label>
<input type="text" id="school">

<label class="title">Medium</label>

<div class="options">

<label class="option">
<input type="radio" name="medium" value="English"> English
</label>

<label class="option">
<input type="radio" name="medium" value="Malayalam"> Malayalam
</label>

</div>

<button type="submit">Submit Application</button>

</form>

<div id="msg" class="success"></div>

</div>

<script>

const subjectSection=document.getElementById("subjectsSection")

const history=document.querySelector(".subject-history")
const geo=document.querySelector(".subject-geo")
const social=document.querySelector(".subject-social")

document.querySelectorAll('input[name="class"]').forEach(el=>{

el.addEventListener("change",()=>{

subjectSection.classList.remove("hidden")

history.style.display="flex"
geo.style.display="flex"
social.style.display="flex"

if(el.value==="8"){
history.style.display="none"
geo.style.display="none"
}

if(el.value==="9" || el.value==="SSLC"){
social.style.display="none"
}

})

})

</script>

</body>
  </html>

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Admission Form</title>

<style>

body{
font-family:system-ui;
background:white;
margin:0;
padding:25px;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:700px;
}

.logo{
display:block;
margin:auto;
max-width:220px;
}

h2{
text-align:center;
margin-top:10px;
margin-bottom:30px;
letter-spacing:1px;
}

label{
font-weight:600;
display:block;
margin-top:18px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:6px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

textarea{
height:90px;
resize:none;
}

.options{
display:flex;
flex-wrap:wrap;
gap:15px;
margin-top:8px;
}

.options label{
font-weight:normal;
display:flex;
align-items:center;
gap:6px;
}

button{
margin-top:30px;
width:100%;
padding:13px;
border:none;
border-radius:6px;
background:black;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#222;
}

.success{
text-align:center;
margin-top:18px;
color:green;
font-weight:600;
}

@media(max-width:500px){

body{
padding:15px;
}

.options{
gap:10px;
}

}

</style>

</head>

<body>

<div class="container">

<img class="logo"
src="https://zvbgebmthcawwybmyzkt.supabase.co/storage/v1/object/public/converted-images/converted_1772948540637_n97ywh.png">

<h2>ADMISSION FORM</h2>

<form id="form">

<label>1. Name of the Student</label>
<input type="text" id="student" required>

<label>2. Name of Parent</label>

<label>Father</label>
<input type="text" id="father">

<label>Mother</label>
<input type="text" id="mother">

<label>3. Contact No.</label>
<input type="tel" pattern="[0-9]*" inputmode="numeric" id="contact" required>

<label>4. Whatsapp No.</label>
<input type="tel" pattern="[0-9]*" inputmode="numeric" id="whatsapp" required>

<label>5. Address</label>
<textarea id="address"></textarea>

<label>6. Class</label>

<div class="options">
<label><input type="radio" name="class" value="8"> 8</label>
<label><input type="radio" name="class" value="9"> 9</label>
<label><input type="radio" name="class" value="SSLC"> SSLC</label>
</div>

<label>7. Tough Subjects</label>

<div class="options">

<label><input type="checkbox" value="English"> English</label>
<label><input type="checkbox" value="Physics"> Physics</label>
<label><input type="checkbox" value="Chemistry"> Chemistry</label>
<label><input type="checkbox" value="Biology"> Biology</label>
<label><input type="checkbox" value="Maths"> Maths</label>
<label><input type="checkbox" value="Arabic"> Arabic</label>
<label><input type="checkbox" value="Malayalam"> Malayalam</label>
<label><input type="checkbox" value="Hindi"> Hindi</label>
<label><input type="checkbox" value="Social Science"> Social Science</label>
<label><input type="checkbox" value="History"> History</label>
<label><input type="checkbox" value="Geography"> Geography</label>

</div>

<label>8. School</label>
<input type="text" id="school">

<label>9. Medium</label>

<div class="options">
<label><input type="radio" name="medium" value="English"> English</label>
<label><input type="radio" name="medium" value="Malayalam"> Malayalam</label>
</div>

<button type="submit">Submit Application</button>

</form>

<div id="msg" class="success"></div>

</div>

<script>

const BIN_ID="69ad0adfae596e708f6bc41c"
const API_KEY="$2a$10$lkC4kFk7MhlaZnTHLacshec/q7QUG/xWMYEY07VpodWh7CjxIsQdy"

document.getElementById("form").addEventListener("submit",async e=>{

e.preventDefault()

const subjects=[]
document.querySelectorAll('input[type=checkbox]:checked')
.forEach(el=>subjects.push(el.value))

const data={

student:document.getElementById("student").value,
father:document.getElementById("father").value,
mother:document.getElementById("mother").value,
contact:document.getElementById("contact").value,
whatsapp:document.getElementById("whatsapp").value,
address:document.getElementById("address").value,
class:document.querySelector('input[name="class"]:checked')?.value,
subjects:subjects,
school:document.getElementById("school").value,
medium:document.querySelector('input[name="medium"]:checked')?.value,
time:new Date().toLocaleString()

}

const res=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{
headers:{"X-Master-Key":API_KEY}
})

const json=await res.json()

const records=json.record.applications||[]

records.push(data)

await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{

method:"PUT",
headers:{
"Content-Type":"application/json",
"X-Master-Key":API_KEY
},

body:JSON.stringify({applications:records})

})

document.getElementById("msg").innerText="Application Submitted Successfully"

document.getElementById("form").reset()

})

</script>

</body>
</html>

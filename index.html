<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>MAAS Admission Form</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">

<style>

*{
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:white;
margin:0;
padding:20px;
}

.container{
max-width:650px;
margin:auto;
}

.logo{
display:block;
margin:auto;
max-width:200px;
margin-bottom:10px;
}

.year{
text-align:center;
font-size:24px;
font-weight:700;
letter-spacing:1px;
white-space:nowrap;
}

.sub{
text-align:center;
font-size:18px;
font-weight:600;
color:#555;
margin-bottom:30px;
}

label.title{
display:block;
margin-top:18px;
font-weight:600;
}

input[type=text],
input[type=tel],
textarea{
width:100%;
padding:12px;
margin-top:6px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

textarea{
height:90px;
resize:none;
}

.options{
margin-top:10px;
display:flex;
flex-direction:column;
gap:10px;
}

.option{
display:flex;
align-items:center;
gap:10px;
font-size:15px;
}

.option input{
width:18px;
height:18px;
}

button{
margin-top:30px;
width:100%;
padding:14px;
border:none;
border-radius:6px;
background:black;
color:white;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#222;
}

.hidden{
display:none;
}

.success{
margin-top:20px;
text-align:center;
color:green;
font-weight:600;
}

</style>

</head>

<body>

<div class="container">

<img class="logo"
src="https://zvbgebmthcawwybmyzkt.supabase.co/storage/v1/object/public/converted-images/converted_1772948540637_n97ywh.png">

<div class="year">ACADEMIC YEAR 2026-27</div>
<div class="sub">Admission Form</div>

<form id="form">

<label class="title">Name of the Student</label>
<input type="text" id="student" required>

<label class="title">Father</label>
<input type="text" id="father" required>

<label class="title">Mother</label>
<input type="text" id="mother" required>

<label class="title">Contact No.</label>
<input type="tel" id="contact" required pattern="[0-9]{10}">

<label class="title">Whatsapp No.</label>
<input type="tel" id="whatsapp" required pattern="[0-9]{10}">

<label class="title">Address</label>
<textarea id="address" required></textarea>

<label class="title">Class</label>

<div class="options">

<label class="option">
<input type="radio" name="class" value="8" required> 8
</label>

<label class="option">
<input type="radio" name="class" value="9"> 9
</label>

<label class="option">
<input type="radio" name="class" value="SSLC"> SSLC
</label>

</div>


<div id="subjectsSection" class="hidden">

<label class="title">Tough Subjects</label>

<div class="options" id="subjects">

<label class="option"><input type="checkbox" value="English"> English</label>
<label class="option"><input type="checkbox" value="Physics"> Physics</label>
<label class="option"><input type="checkbox" value="Chemistry"> Chemistry</label>
<label class="option"><input type="checkbox" value="Biology"> Biology</label>
<label class="option"><input type="checkbox" value="Maths"> Maths</label>
<label class="option"><input type="checkbox" value="Arabic"> Arabic</label>
<label class="option"><input type="checkbox" value="Malayalam"> Malayalam</label>
<label class="option"><input type="checkbox" value="Hindi"> Hindi</label>

<label class="option subject-social">
<input type="checkbox" value="Social Science"> Social Science
</label>

<label class="option subject-history">
<input type="checkbox" value="History"> History
</label>

<label class="option subject-geo">
<input type="checkbox" value="Geography"> Geography
</label>

</div>

</div>

<label class="title">School</label>
<input type="text" id="school" required>

<label class="title">Medium</label>

<div class="options">

<label class="option">
<input type="radio" name="medium" value="English" required> English
</label>

<label class="option">
<input type="radio" name="medium" value="Malayalam"> Malayalam
</label>

</div>

<button type="submit">Submit Application</button>

</form>

<div id="msg" class="success"></div>

</div>


<script>

const BIN_ID="69ad0adfae596e708f6bc41c"
const API_KEY="$2a$10$lkC4kFk7MhlaZnTHLacshec/q7QUG/xWMYEY07VpodWh7CjxIsQdy"

const subjectSection=document.getElementById("subjectsSection")
const history=document.querySelector(".subject-history")
const geo=document.querySelector(".subject-geo")
const social=document.querySelector(".subject-social")

document.querySelectorAll('input[name="class"]').forEach(el=>{

el.addEventListener("change",()=>{

subjectSection.classList.remove("hidden")

history.style.display="flex"
geo.style.display="flex"
social.style.display="flex"

if(el.value==="8"){
history.style.display="none"
geo.style.display="none"
}

if(el.value==="9" || el.value==="SSLC"){
social.style.display="none"
}

})

})

const form=document.getElementById("form")
const msg=document.getElementById("msg")

form.addEventListener("submit",async function(e){

e.preventDefault()

try{

const subjects=[]
document.querySelectorAll('#subjects input:checked')
.forEach(el=>subjects.push(el.value))

const data={
student:document.getElementById("student").value,
father:document.getElementById("father").value,
mother:document.getElementById("mother").value,
contact:document.getElementById("contact").value,
whatsapp:document.getElementById("whatsapp").value,
address:document.getElementById("address").value,
class:document.querySelector('input[name="class"]:checked').value,
subjects:subjects,
school:document.getElementById("school").value,
medium:document.querySelector('input[name="medium"]:checked').value,
time:new Date().toLocaleString()
}

const get=await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{
headers:{ "X-Master-Key":API_KEY }
})

const json=await get.json()

const records=json.record.applications || []

records.push(data)

await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}`,{
method:"PUT",
headers:{
"Content-Type":"application/json",
"X-Master-Key":API_KEY,
"X-Bin-Versioning":"false"
},
body:JSON.stringify({applications:records})
})

msg.innerText="Application Submitted Successfully"

form.reset()

subjectSection.classList.add("hidden")

}catch(err){

msg.innerText="Submission failed. Please try again."

}

})

</script>

</body>
</html>

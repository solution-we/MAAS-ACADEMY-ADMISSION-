<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admission Form</title>

<style>

body{
font-family:system-ui;
background:white;
margin:0;
padding:25px;
display:flex;
justify-content:center;
}

.container{
width:100%;
max-width:650px;
}

.logo{
display:block;
margin:auto;
max-width:220px;
}

h2{
text-align:center;
margin-top:10px;
margin-bottom:30px;
letter-spacing:1px;
}

label{
font-weight:600;
display:block;
margin-top:20px;
}

input,textarea{
width:100%;
padding:10px;
margin-top:6px;
border:1px solid #ddd;
border-radius:6px;
font-size:14px;
}

textarea{
height:90px;
resize:none;
}

/* option list */

.options{
margin-top:10px;
display:flex;
flex-direction:column;
gap:8px;
}

.option{
display:flex;
align-items:center;
gap:10px;
font-weight:400;
}

.option input{
width:16px;
height:16px;
}

button{
margin-top:30px;
width:100%;
padding:13px;
border:none;
border-radius:6px;
background:black;
color:white;
font-size:16px;
cursor:pointer;
}

.success{
text-align:center;
margin-top:18px;
color:green;
font-weight:600;
}

</style>

</head>

<body>

<div class="container">

<img class="logo"
src="https://zvbgebmthcawwybmyzkt.supabase.co/storage/v1/object/public/converted-images/converted_1772948540637_n97ywh.png">

<h2>ADMISSION FORM</h2>

<form id="form">

<label>Name of the Student</label>
<input type="text" id="student" required>

<label>Name of Parent</label>

<label>Father</label>
<input type="text" id="father">

<label>Mother</label>
<input type="text" id="mother">

<label>Contact No.</label>
<input type="tel" pattern="[0-9]*" inputmode="numeric" id="contact" required>

<label>Whatsapp No.</label>
<input type="tel" pattern="[0-9]*" inputmode="numeric" id="whatsapp" required>

<label>Address</label>
<textarea id="address"></textarea>

<label>Class</label>

<div class="options">

<label class="option">
<input type="radio" name="class" value="8"> 8
</label>

<label class="option">
<input type="radio" name="class" value="9"> 9
</label>

<label class="option">
<input type="radio" name="class" value="SSLC"> SSLC
</label>

</div>

<label>Tough Subjects</label>

<div class="options">

<label class="option"><input type="checkbox" value="English"> English</label>
<label class="option"><input type="checkbox" value="Physics"> Physics</label>
<label class="option"><input type="checkbox" value="Chemistry"> Chemistry</label>
<label class="option"><input type="checkbox" value="Biology"> Biology</label>
<label class="option"><input type="checkbox" value="Maths"> Maths</label>
<label class="option"><input type="checkbox" value="Arabic"> Arabic</label>
<label class="option"><input type="checkbox" value="Malayalam"> Malayalam</label>
<label class="option"><input type="checkbox" value="Hindi"> Hindi</label>
<label class="option"><input type="checkbox" value="Social Science"> Social Science</label>
<label class="option"><input type="checkbox" value="History"> History</label>
<label class="option"><input type="checkbox" value="Geography"> Geography</label>

</div>

<label>School</label>
<input type="text" id="school">

<label>Medium</label>

<div class="options">

<label class="option">
<input type="radio" name="medium" value="English"> English
</label>

<label class="option">
<input type="radio" name="medium" value="Malayalam"> Malayalam
</label>

</div>

<button type="submit">Submit Application</button>

</form>

<div id="msg" class="success"></div>

</div>

</body>
</html>

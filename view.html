<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Student Application</title>

<style>

body{
font-family:system-ui;
background:#f5f5f5;
padding:20px;
}

.card{
max-width:650px;
margin:auto;
background:white;
padding:25px;
border-radius:8px;
box-shadow:0 2px 8px rgba(0,0,0,0.1);
}

h2{
margin-bottom:20px;
}

.row{
margin:8px 0;
}

.label{
font-weight:600;
}

.back{
display:inline-block;
margin-bottom:15px;
text-decoration:none;
color:#007bff;
}

</style>

</head>

<body>

<div class="card">

<a class="back" href="admin.html">← Back to list</a>

<h2>Student Details</h2>

<div id="data">Loading...</div>

</div>

<script>

const BIN_ID = "69ad0adfae596e708f6bc41c"
const API_KEY = "$2a$10$lkC4kFk7MhlaZnTHLacshec/q7QUG/xWMYEY07VpodWh7CjxIsQdy"

const params = new URLSearchParams(window.location.search)
const id = params.get("id")

async function load(){

try{

const res = await fetch(`https://api.jsonbin.io/v3/b/${BIN_ID}/latest`,{
headers:{ "X-Master-Key":API_KEY }
})

const json = await res.json()

const list = json.record?.applications || []

const student = list[id]

if(!student){
document.getElementById("data").innerHTML="Student not found"
return
}

document.getElementById("data").innerHTML = `

<div class="row"><span class="label">Student:</span> ${student.student || ""}</div>

<div class="row"><span class="label">Father:</span> ${student.father || ""}</div>

<div class="row"><span class="label">Mother:</span> ${student.mother || ""}</div>

<div class="row"><span class="label">Contact:</span> ${student.contact || ""}</div>

<div class="row"><span class="label">Whatsapp:</span> ${student.whatsapp || ""}</div>

<div class="row"><span class="label">Address:</span> ${student.address || ""}</div>

<div class="row"><span class="label">Class:</span> ${student.class || ""}</div>

<div class="row"><span class="label">Subjects:</span> ${(student.subjects || []).join(", ")}</div>

<div class="row"><span class="label">School:</span> ${student.school || ""}</div>

<div class="row"><span class="label">Medium:</span> ${student.medium || ""}</div>

<div class="row"><span class="label">Submitted:</span> ${student.time || ""}</div>

`

}catch(err){

document.getElementById("data").innerHTML="Error loading application"

}

}

load()

</script>

</body>
</html>
